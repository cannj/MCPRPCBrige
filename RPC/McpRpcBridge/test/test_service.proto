syntax = "proto3";

package testproto;

option cc_generic_services = true;

// 测试消息类型

// 简单的登录请求
message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    bool success = 1;
    string token = 2;
}

// 用户相关消息
message User {
    int32 id = 1;
    string name = 2;
    string email = 3;
    bool active = 4;
}

message GetUserRequest {
    int32 user_id = 1;
}

message GetUserResponse {
    User user = 1;
}

message CreateUserRequest {
    string name = 1;
    string email = 2;
}

message CreateUserResponse {
    User user = 1;
}

message DeleteUserRequest {
    int32 user_id = 1;
}

message DeleteUserResponse {
    bool success = 1;
}

// 列表请求
message ListUsersRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message ListUsersResponse {
    repeated User users = 1;
    int32 total = 2;
}

// 测试流式 RPC
message StreamRequest {
    int32 count = 1;
}

message StreamResponse {
    string data = 1;
}

// 测试服务定义
service TestUserServiceRpc {
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

    // 流式 RPC（用于测试）
    rpc StreamData(StreamRequest) returns (stream StreamResponse);
}

// 另一个测试服务（用于命名冲突测试）
service TestOrderServiceRpc {
    rpc GetOrder(GetUserRequest) returns (GetUserResponse);
    rpc CreateOrder(CreateUserRequest) returns (CreateUserResponse);
}
